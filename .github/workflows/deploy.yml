name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Frontend → Vercel
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Skip if no Vercel token
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: echo "Skipping — VERCEL_TOKEN not configured"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ secrets.VERCEL_TOKEN != '' }}

      - name: Setup Node
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────────────────────
  # Backend → Railway (web + worker)
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Skip if no Railway token
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: echo "Skipping — RAILWAY_TOKEN not configured"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ secrets.RAILWAY_TOKEN != '' }}

      - name: Install Railway CLI
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: npm install -g @railway/cli@latest

      - name: Deploy backend (web service)
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: railway up --service web --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy worker
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: railway up --service worker --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ─────────────────────────────────────────────────────────────
  # Post-deploy health check
  # ─────────────────────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    if: ${{ always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success') }}
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Check backend health
        if: ${{ secrets.BACKEND_URL != '' }}
        run: |
          echo "Polling backend health endpoint..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/api/v1/health/live" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is alive (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Backend health check failed after 30 attempts"
          exit 1

      - name: Check frontend landing page
        if: ${{ secrets.FRONTEND_URL != '' }}
        run: |
          echo "Polling frontend landing page..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.FRONTEND_URL }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is live (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Frontend health check failed after 30 attempts"
          exit 1

  # ─────────────────────────────────────────────────────────────
  # Summary — always runs so the workflow shows as complete
  # ─────────────────────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    if: ${{ always() }}
    needs: [deploy-frontend, deploy-backend, health-check]
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## Deploy Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend deploy | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend deploy | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health check | ${{ needs.health-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-frontend.result }}" = "skipped" ] && [ "${{ needs.deploy-backend.result }}" = "skipped" ]; then
            echo "Both deploys skipped — **secrets not configured yet**." >> $GITHUB_STEP_SUMMARY
            echo "See [Deployment Guide](docs/DEPLOYMENT.md) to set up Vercel + Railway." >> $GITHUB_STEP_SUMMARY
          fi
